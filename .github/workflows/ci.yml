name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    env:
      # Real secrets used if configured, dummy fallbacks allow mocked e2e to boot
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://dummy.supabase.co' }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY || 'dummy-service-role-key' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'dummy-jwt-secret' }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e
